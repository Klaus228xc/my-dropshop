<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UA Drop | Магазин якісних товарів</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f9fafc 0%, #f0f2f5 100%);
            color: #1a1e2b;
        }

        .header {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1f2b4e, #2c3e66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .cart-icon {
            background: #ffffff;
            padding: 10px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #eef2f8;
        }
        .cart-icon:hover {
            background: #fefefe;
            box-shadow: 0 12px 22px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }
        .cart-icon span {
            font-weight: 600;
            font-size: 1.2rem;
        }
        .cart-count {
            background: #e63946;
            color: white;
            border-radius: 40px;
            padding: 2px 10px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .catalog-title {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            letter-spacing: -0.3px;
            background: linear-gradient(120deg, #1f2b4e, #3b4b72);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: #ffffff;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 18px 30px -12px rgba(0,0,0,0.08);
            transition: all 0.25s ease;
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 38px -14px rgba(0,0,0,0.15);
        }
        .product-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #f7f9fc;
            border-bottom: 1px solid #edf2f7;
        }
        .product-info {
            padding: 1.3rem 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .product-title {
            font-weight: 600;
            font-size: 1.1rem;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: #121826;
        }
        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2b4e;
            margin: 0.5rem 0;
        }
        .stock-badge {
            font-size: 0.75rem;
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            background: #eef2ff;
            color: #1f4f2b;
            width: fit-content;
            margin-bottom: 1rem;
        }
        .outofstock {
            background: #ffe8e8;
            color: #b91c1c;
        }
        .add-to-cart {
            background: #1f2b4e;
            border: none;
            color: white;
            padding: 0.8rem 0;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .add-to-cart:hover {
            background: #2c3e66;
            transform: scale(0.98);
        }
        .add-to-cart:disabled {
            background: #b9c2d4;
            cursor: not-allowed;
        }

        /* Модалка корзини */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            max-width: 550px;
            width: 90%;
            border-radius: 40px;
            padding: 2rem;
            box-shadow: 0 40px 60px rgba(0,0,0,0.2);
            animation: fadeInUp 0.25s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .cart-items-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 1rem 0;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #ecf0f4;
        }
        .cart-item-name {
            font-weight: 500;
            flex: 2;
        }
        .cart-item-price {
            font-weight: 600;
            margin: 0 1rem;
        }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .cart-item-qty button {
            background: #f0f2f5;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-total {
            font-size: 1.4rem;
            font-weight: 800;
            text-align: right;
            margin: 1rem 0;
            border-top: 2px solid #eef2f8;
            padding-top: 1rem;
        }
        .payment-methods {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            justify-content: center;
        }
        .payment-methods label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f8fafd;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .payment-methods input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .pay-btn {
            background: #2c6e2f;
            width: 100%;
            padding: 1rem;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
        }
        .pay-btn:hover {
            background: #1e4a21;
            transform: scale(0.98);
        }
        .close-modal {
            float: right;
            font-size: 1.7rem;
            cursor: pointer;
            background: none;
            border: none;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #6c7a8e;
            font-size: 0.8rem;
        }
        .order-info {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        .order-info input, .order-info textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        @media (max-width: 680px) {
            .container { padding: 0 1rem; }
            .product-title { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="header-container">
        <div class="logo"> UA DROP</div>
        <div class="cart-icon" id="cartIcon">
            <span>🛒</span>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>
</div>

<div class="container">
    <div class="catalog-title">✨ Топ пропозиції</div>
    <div class="products-grid" id="productsGrid"></div>
</div>

<!-- Модалка корзини -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn">&times;</button>
        <h2>Кошик</h2>
        <div id="cartItemsList" class="cart-items-list"></div>
        <div id="cartTotal" class="cart-total">Всього: 0 ₴</div>

        <div class="payment-methods">
            <label>
                <input type="radio" name="paymentMethod" value="online" checked> 💳 Онлайн-оплата
            </label>
            <label>
                <input type="radio" name="paymentMethod" value="cod"> 📦 Накладений платіж
            </label>
        </div>

        <div id="codFields" style="display: none;" class="order-info">
            <input type="text" id="customerName" placeholder="Ваше ім'я та прізвище" autocomplete="name">
            <input type="tel" id="customerPhone" placeholder="Номер телефону" autocomplete="tel">
            <textarea id="customerAddress" rows="2" placeholder="Адреса доставки (місто, відділення Нової Пошти / адреса)"></textarea>
        </div>

        <button id="checkoutButton" class="pay-btn">💳 Оформити замовлення</button>
    </div>
</div>

<footer>© UA Drop — якісні товари з доставкою по всій Україні</footer>

<script>
    // Товари (перші 15 з вашого CSV)
    const productsData = [
        { sku: "ws78472", name: "Масажна подушка Car and Home", price: 529, stock: "instock", img: "https://www.websklad.biz.ua/wp-content/uploads/jcayvpe4kcuvyaay.jpg" },
        { sku: "ws30483", name: "Бокс для зберігання косметики з дзеркалом", price: 399, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/qsd2wzd.jpg" },
        { sku: "ws87556", name: "УФ лампа для манікюру ZH-818", price: 499, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/wdefqd.jpg" },
        { sku: "ws53905", name: "Точилка Bavarian Edge Knife Sharpener", price: 249, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/wqd132.jpg" },
        { sku: "ws33813", name: "Гребінець-випрямляч Fast Hair Straightener", price: 299, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/tgwesdgesae.jpg" },
        { sku: "ws36558", name: "Тканинна шафа-органайзер 105x45x170 см", price: 629, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/fewx23.png" },
        { sku: "ws52037", name: "Пояс для схуднення Neotex Hot Shapers", price: 149, stock: "instock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/1wqeds.jpg" },
        { sku: "ws46146", name: "Кухонні ваги Domotec SF-400 до 10 кг", price: 249, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/wqd.jpg" },
        { sku: "ws56917", name: "Бездротова зарядка Awei W2", price: 298, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/ewfdqedscd2.jpg" },
        { sku: "ws72465", name: "Потрійне дзеркало для макіяжу з підсвіткою", price: 399, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/IMG_2736.jpg" },
        { sku: "ws71351", name: "Автомобільний компресор Air Compressor", price: 299, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/uaivukaifvvif.jpg" },
        { sku: "ws27255", name: "Машинка для видалення катишків Hengda HD-779", price: 229, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/81520725_images_11695556319.jpg" },
        { sku: "ws53562", name: "Домашній тренажер Revoflex Xtreme", price: 399, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/edfwfwe.jpg" },
        { sku: "ws25204", name: "Електричний масажер з інфрачервоним випромінюванням", price: 749, stock: "instock", img: "https://www.websklad.biz.ua/wp-content/uploads/e4upaveucyvpkvyaav.jpg" },
        { sku: "ws88434", name: "Ланч бокс електричний з підігрівом", price: 359, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/3kcvaypeuyavpvy.jpg" }
    ];

    let cart = {};
    let selectedPayment = "online";

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        grid.innerHTML = '';
        productsData.forEach(prod => {
            const inStock = prod.stock === 'instock';
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img class="product-img" src="${prod.img}" alt="${prod.name}" loading="lazy" onerror="this.src='https://placehold.co/400x400?text=No+Image'">
                <div class="product-info">
                    <div class="product-title">${prod.name}</div>
                    <div class="product-price">${prod.price} ₴</div>
                    <span class="stock-badge ${!inStock ? 'outofstock' : ''}">${inStock ? '✓ В наявності' : '✗ Немає'}</span>
                    <button class="add-to-cart" data-sku="${prod.sku}" ${!inStock ? 'disabled' : ''}>${inStock ? '➕ В кошик' : '❌ Недоступний'}</button>
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const sku = btn.dataset.sku;
                addToCart(sku);
            });
        });
    }

    function addToCart(sku) {
        if (cart[sku]) cart[sku]++;
        else cart[sku] = 1;
        updateCartUI();
        showToast('Товар додано до кошика', '#1f2b4e');
    }

    function updateCartUI() {
        const totalItems = Object.values(cart).reduce((a,b) => a+b, 0);
        const cartCountSpan = document.getElementById('cartCount');
        if (cartCountSpan) cartCountSpan.innerText = totalItems;

        const cartContainer = document.getElementById('cartItemsList');
        const totalSpan = document.getElementById('cartTotal');
        if (!cartContainer) return;

        if (totalItems === 0) {
            cartContainer.innerHTML = '<div style="text-align:center; padding:2rem;">Кошик порожній 🛒</div>';
            totalSpan.innerText = 'Всього: 0 ₴';
            return;
        }

        let totalPrice = 0;
        let html = '';
        for (let [sku, qty] of Object.entries(cart)) {
            const product = productsData.find(p => p.sku === sku);
            if (!product) continue;
            const itemTotal = product.price * qty;
            totalPrice += itemTotal;
            html += `
                <div class="cart-item">
                    <div class="cart-item-name">${product.name}</div>
                    <div class="cart-item-price">${product.price} ₴</div>
                    <div class="cart-item-qty">
                        <button data-sku="${sku}" data-delta="-1">−</button>
                        <span>${qty}</span>
                        <button data-sku="${sku}" data-delta="1">+</button>
                        <button data-sku="${sku}" data-delta="-999" style="background:#ffe0e0;">🗑</button>
                    </div>
                </div>
            `;
        }
        cartContainer.innerHTML = html;
        totalSpan.innerText = `Всього: ${totalPrice} ₴`;

        document.querySelectorAll('.cart-item-qty button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const sku = btn.dataset.sku;
                let delta = parseInt(btn.dataset.delta);
                if (isNaN(delta)) return;
                if (delta === -999) {
                    delete cart[sku];
                } else {
                    const newQty = (cart[sku] || 0) + delta;
                    if (newQty <= 0) delete cart[sku];
                    else cart[sku] = newQty;
                }
                updateCartUI();
            });
        });
    }

    function showToast(msg, bgColor) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = bgColor;
        toast.style.color = 'white';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '60px';
        toast.style.fontWeight = '500';
        toast.style.zIndex = '999';
        toast.style.boxShadow = '0 10px 20px rgba(0,0,0,0.2)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    const modal = document.getElementById('cartModal');
    const cartIcon = document.getElementById('cartIcon');
    const closeModalBtn = document.getElementById('closeModalBtn');

    cartIcon?.addEventListener('click', () => {
        updateCartUI();
        modal.style.display = 'flex';
    });
    closeModalBtn?.addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

    const radioOnline = document.querySelector('input[value="online"]');
    const radioCod = document.querySelector('input[value="cod"]');
    const codFieldsDiv = document.getElementById('codFields');

    radioOnline?.addEventListener('change', () => {
        selectedPayment = 'online';
        codFieldsDiv.style.display = 'none';
    });
    radioCod?.addEventListener('change', () => {
        selectedPayment = 'cod';
        codFieldsDiv.style.display = 'block';
    });

    const checkoutBtn = document.getElementById('checkoutButton');
    checkoutBtn?.addEventListener('click', async () => {
        const items = Object.entries(cart);
        if (items.length === 0) {
            showToast('Кошик порожній, додайте товари', '#b91c1c');
            return;
        }

        const total = Object.entries(cart).reduce((sum, [sku, qty]) => {
            const prod = productsData.find(p => p.sku === sku);
            return sum + (prod ? prod.price * qty : 0);
        }, 0);

        if (selectedPayment === 'cod') {
            const name = document.getElementById('customerName')?.value.trim();
            const phone = document.getElementById('customerPhone')?.value.trim();
            const address = document.getElementById('customerAddress')?.value.trim();
            if (!name || !phone || !address) {
                showToast('Заповніть імʼя, телефон та адресу для накладеного платежу', '#b91c1c');
                return;
            }
            showToast(`✅ Замовлення на суму ${total} грн оформлено (накладений платіж). Менеджер звʼяжеться з вами.`, '#2c6e2f');
            console.log('Замовлення (нал. платіж):', { items, total, customer: { name, phone, address } });
            cart = {};
            updateCartUI();
            modal.style.display = 'none';
            return;
        }

        // Онлайн-оплата (демо)
        try {
            showToast('Перенаправлення на оплату...', '#2c6e2f');
            setTimeout(() => {
                alert(`✅ Онлайн-оплата на суму ${total} грн успішно завершена (демо-режим).\nУ реальному проєкті тут буде перехід на платіжний шлюз.`);
                cart = {};
                updateCartUI();
                modal.style.display = 'none';
            }, 500);
        } catch (err) {
            alert('Помилка при ініціалізації оплати. Спробуйте пізніше.');
        }
    });

    renderProducts();
    updateCartUI();
</script>
</body>
</html>
