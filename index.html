<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UA Drop | Сучасний магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: #ffffff;
            color: #1a1e2b;
        }

        /* Шапка */
        .header {
            background: #ffffff;
            box-shadow: 0 2px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #f0f0f0;
        }
        .header-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #111;
        }
        .logo span {
            color: #2563eb;
        }
        .cart-icon {
            background: #f8fafc;
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #eef2f8;
        }
        .cart-icon:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
        }
        .cart-count {
            background: #2563eb;
            color: white;
            border-radius: 30px;
            padding: 2px 10px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Основний контент */
        .container {
            max-width: 1280px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .catalog-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 2rem;
            letter-spacing: -0.3px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* Карточка товару */
        .product-card {
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02);
            transition: all 0.25s ease;
            border: 1px solid #f0f2f5;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1);
            border-color: #e2e8f0;
        }
        .product-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #f9fafb;
        }
        .product-info {
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
        }
        .product-title {
            font-weight: 500;
            font-size: 1rem;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }
        .product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0.5rem 0;
        }
        .stock-badge {
            font-size: 0.7rem;
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            background: #e6f7e6;
            color: #2b6e2f;
            width: fit-content;
            margin-bottom: 1rem;
        }
        .outofstock {
            background: #fee2e2;
            color: #b91c1c;
        }
        .add-to-cart {
            background: #2563eb;
            border: none;
            color: white;
            padding: 0.7rem 0;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .add-to-cart:hover {
            background: #1d4ed8;
            transform: scale(0.98);
        }
        .add-to-cart:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        /* Модалка корзини */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            max-width: 600px;
            width: 90%;
            border-radius: 28px;
            padding: 1.8rem;
            box-shadow: 0 40px 60px rgba(0,0,0,0.2);
            animation: fadeInUp 0.25s ease;
            max-height: 85vh;
            overflow-y: auto;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .cart-items-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 1rem 0;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #ecf0f4;
        }
        .cart-item-name {
            font-weight: 500;
            flex: 2;
            font-size: 0.9rem;
        }
        .cart-item-price {
            font-weight: 600;
            margin: 0 0.5rem;
        }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .cart-item-qty button {
            background: #f0f2f5;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-total {
            font-size: 1.3rem;
            font-weight: 700;
            text-align: right;
            margin: 1rem 0;
            border-top: 2px solid #eef2f8;
            padding-top: 1rem;
        }
        .payment-methods {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            justify-content: center;
        }
        .payment-methods label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f8fafd;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            font-size: 0.9rem;
        }
        .payment-methods input {
            width: 16px;
            height: 16px;
        }
        .order-info {
            background: #f8fafc;
            border-radius: 24px;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        .order-info input, .order-info textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.9rem;
            background: white;
        }
        .pay-btn {
            background: #2563eb;
            width: 100%;
            padding: 0.9rem;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
        }
        .pay-btn:hover {
            background: #1d4ed8;
        }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            font-size: 0.8rem;
            border-top: 1px solid #ecf0f4;
            margin-top: 3rem;
        }
        @media (max-width: 680px) {
            .container { padding: 0 1rem; }
            .header-container { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="header-container">
        <div class="logo">UA<span>DROP</span></div>
        <div class="cart-icon" id="cartIcon">
            <span>🛒</span>
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </div>
</div>

<div class="container">
    <div class="catalog-title">✨ Популярні товари</div>
    <div class="products-grid" id="productsGrid"></div>
</div>

<!-- Модалка корзини -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn">&times;</button>
        <h2>Кошик</h2>
        <div id="cartItemsList" class="cart-items-list"></div>
        <div id="cartTotal" class="cart-total">Всього: 0 ₴</div>

        <div class="payment-methods">
            <label>
                <input type="radio" name="paymentMethod" value="online" checked> 💳 Онлайн-оплата
            </label>
            <label>
                <input type="radio" name="paymentMethod" value="cod"> 📦 Накладений платіж
            </label>
        </div>

        <!-- ПОЛЯ ДЛЯ КОНТАКТНИХ ДАНИХ (обов'язкові для обох способів оплати) -->
        <div class="order-info" id="customerFields">
            <input type="text" id="customerName" placeholder="Ваше ім'я та прізвище" autocomplete="name">
            <input type="tel" id="customerPhone" placeholder="Номер телефону" autocomplete="tel">
            <textarea id="customerAddress" rows="2" placeholder="Адреса доставки (місто, відділення Нової Пошти / адреса)"></textarea>
        </div>

        <button id="checkoutButton" class="pay-btn">💳 Оформити замовлення</button>
    </div>
</div>

<footer>© UA Drop — якісні товари з доставкою по всій Україні</footer>

<script>
    // ================= НАЛАШТУВАННЯ =================
    const ADMIN_WHATSAPP = "380123456789";   // ЗМІНІТЬ НА СВІЙ НОМЕР
    // ==============================================

    // Товари (перші 15)
    const productsData = [
        { sku: "ws78472", name: "Масажна подушка Car and Home", price: 529, stock: "instock", img: "https://www.websklad.biz.ua/wp-content/uploads/jcayvpe4kcuvyaay.jpg" },
        { sku: "ws30483", name: "Бокс для зберігання косметики з дзеркалом", price: 399, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/qsd2wzd.jpg" },
        { sku: "ws87556", name: "УФ лампа для манікюру ZH-818", price: 499, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/wdefqd.jpg" },
        { sku: "ws53905", name: "Точилка Bavarian Edge Knife Sharpener", price: 249, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/wqd132.jpg" },
        { sku: "ws33813", name: "Гребінець-випрямляч Fast Hair Straightener", price: 299, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/tgwesdgesae.jpg" },
        { sku: "ws36558", name: "Тканинна шафа-органайзер 105x45x170 см", price: 629, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/fewx23.png" },
        { sku: "ws52037", name: "Пояс для схуднення Neotex Hot Shapers", price: 149, stock: "instock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/1wqeds.jpg" },
        { sku: "ws46146", name: "Кухонні ваги Domotec SF-400 до 10 кг", price: 249, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/wqd.jpg" },
        { sku: "ws56917", name: "Бездротова зарядка Awei W2", price: 298, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/ewfdqedscd2.jpg" },
        { sku: "ws72465", name: "Потрійне дзеркало для макіяжу з підсвіткою", price: 399, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/IMG_2736.jpg" },
        { sku: "ws71351", name: "Автомобільний компресор Air Compressor", price: 299, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/uaivukaifvvif.jpg" },
        { sku: "ws27255", name: "Машинка для видалення катишків Hengda HD-779", price: 229, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/81520725_images_11695556319.jpg" },
        { sku: "ws53562", name: "Домашній тренажер Revoflex Xtreme", price: 399, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/2020/09/edfwfwe.jpg" },
        { sku: "ws25204", name: "Електричний масажер з інфрачервоним випромінюванням", price: 749, stock: "instock", img: "https://www.websklad.biz.ua/wp-content/uploads/e4upaveucyvpkvyaav.jpg" },
        { sku: "ws88434", name: "Ланч бокс електричний з підігрівом", price: 359, stock: "outofstock", img: "https://www.websklad.biz.ua/wp-content/uploads/3kcvaypeuyavpvy.jpg" }
    ];

    let cart = {};
    let selectedPayment = "online";

    function saveOrder(orderData) {
        let orders = JSON.parse(localStorage.getItem('ua_drop_orders')) || [];
        orderData.id = Date.now();
        orderData.date = new Date().toLocaleString('uk-UA');
        orderData.status = 'Нове';
        orders.push(orderData);
        localStorage.setItem('ua_drop_orders', JSON.stringify(orders));
        return orderData.id;
    }

    function sendOrderToWhatsApp(order) {
        if (!ADMIN_WHATSAPP) return;
        let message = `🛍 *НОВЕ ЗАМОВЛЕННЯ #${order.id}*\n`;
        message += `📅 Дата: ${order.date}\n`;
        message += `💳 Оплата: ${order.paymentMethod}\n`;
        message += `💰 Сума: ${order.total.toFixed(2)} грн\n\n`;
        message += `📦 *Товари:*\n`;
        order.items.forEach(item => {
            message += `• ${item.name} — ${item.quantity} шт. x ${item.price} грн = ${item.total} грн\n`;
        });
        if (order.customer) {
            message += `\n👤 *Клієнт:*\n`;
            message += `Ім'я: ${order.customer.name}\n`;
            message += `Телефон: ${order.customer.phone}\n`;
            message += `Адреса: ${order.customer.address}\n`;
        }
        const encoded = encodeURIComponent(message);
        let phone = ADMIN_WHATSAPP.replace(/[^0-9+]/g, '');
        if (!phone.startsWith('+')) phone = '+' + phone;
        window.open(`https://wa.me/${phone}?text=${encoded}`, '_blank');
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        grid.innerHTML = '';
        productsData.forEach(prod => {
            const inStock = prod.stock === 'instock';
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img class="product-img" src="${prod.img}" alt="${prod.name}" loading="lazy" onerror="this.src='https://placehold.co/400x400?text=No+Image'">
                <div class="product-info">
                    <div class="product-title">${prod.name}</div>
                    <div class="product-price">${prod.price} ₴</div>
                    <span class="stock-badge ${!inStock ? 'outofstock' : ''}">${inStock ? '✓ В наявності' : '✗ Немає'}</span>
                    <button class="add-to-cart" data-sku="${prod.sku}" ${!inStock ? 'disabled' : ''}>${inStock ? '➕ В кошик' : '❌ Недоступний'}</button>
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', () => addToCart(btn.dataset.sku));
        });
    }

    function addToCart(sku) {
        cart[sku] = (cart[sku] || 0) + 1;
        updateCartUI();
        showToast('Товар додано до кошика', '#2563eb');
    }

    function updateCartUI() {
        const totalItems = Object.values(cart).reduce((a,b) => a+b, 0);
        document.getElementById('cartCount').innerText = totalItems;
        const container = document.getElementById('cartItemsList');
        const totalSpan = document.getElementById('cartTotal');
        if (!container) return;

        if (totalItems === 0) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">Кошик порожній 🛒</div>';
            totalSpan.innerText = 'Всього: 0 ₴';
            return;
        }

        let totalPrice = 0;
        let html = '';
        for (let [sku, qty] of Object.entries(cart)) {
            const prod = productsData.find(p => p.sku === sku);
            if (!prod) continue;
            const itemTotal = prod.price * qty;
            totalPrice += itemTotal;
            html += `
                <div class="cart-item">
                    <div class="cart-item-name">${prod.name}</div>
                    <div class="cart-item-price">${prod.price} ₴</div>
                    <div class="cart-item-qty">
                        <button data-sku="${sku}" data-delta="-1">−</button>
                        <span>${qty}</span>
                        <button data-sku="${sku}" data-delta="1">+</button>
                        <button data-sku="${sku}" data-delta="-999">🗑</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        totalSpan.innerText = `Всього: ${totalPrice} ₴`;

        document.querySelectorAll('.cart-item-qty button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const sku = btn.dataset.sku;
                let delta = parseInt(btn.dataset.delta);
                if (isNaN(delta)) return;
                if (delta === -999) delete cart[sku];
                else {
                    const newQty = (cart[sku] || 0) + delta;
                    if (newQty <= 0) delete cart[sku];
                    else cart[sku] = newQty;
                }
                updateCartUI();
            });
        });
    }

    function showToast(msg, bgColor) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.cssText = `position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:${bgColor}; color:white; padding:10px 20px; border-radius:60px; z-index:999; font-weight:500; box-shadow:0 10px 20px rgba(0,0,0,0.2);`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    const modal = document.getElementById('cartModal');
    document.getElementById('cartIcon').onclick = () => { updateCartUI(); modal.style.display = 'flex'; };
    document.getElementById('closeModalBtn').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
        radio.addEventListener('change', (e) => selectedPayment = e.target.value);
    });

    document.getElementById('checkoutButton').addEventListener('click', async () => {
        const items = Object.entries(cart);
        if (items.length === 0) {
            showToast('Кошик порожній', '#b91c1c');
            return;
        }

        // Отримуємо контактні дані (обов'язкові для обох способів оплати)
        const name = document.getElementById('customerName').value.trim();
        const phone = document.getElementById('customerPhone').value.trim();
        const address = document.getElementById('customerAddress').value.trim();
        if (!name || !phone || !address) {
            showToast('Заповніть імʼя, телефон та адресу доставки', '#b91c1c');
            return;
        }

        const total = Object.entries(cart).reduce((sum, [sku, qty]) => {
            const prod = productsData.find(p => p.sku === sku);
            return sum + (prod ? prod.price * qty : 0);
        }, 0);

        const orderItems = items.map(([sku, qty]) => {
            const prod = productsData.find(p => p.sku === sku);
            return { name: prod.name, sku, price: prod.price, quantity: qty, total: prod.price * qty };
        });

        const orderDetails = {
            items: orderItems,
            total: total,
            paymentMethod: selectedPayment === 'online' ? 'Онлайн-оплата' : 'Накладений платіж',
            customer: { name, phone, address }
        };

        if (selectedPayment === 'cod') {
            const orderId = saveOrder(orderDetails);
            orderDetails.id = orderId;
            sendOrderToWhatsApp(orderDetails);
            showToast(`✅ Замовлення №${orderId} оформлено. Деталі надіслано адміністратору.`, '#2b6e2f');
            cart = {};
            updateCartUI();
            modal.style.display = 'none';
            return;
        }

        // Онлайн-оплата (демо)
        try {
            showToast('Перенаправлення на оплату...', '#2563eb');
            setTimeout(() => {
                const orderId = saveOrder(orderDetails);
                orderDetails.id = orderId;
                sendOrderToWhatsApp(orderDetails);
                alert(`✅ Онлайн-оплата на суму ${total} грн успішно завершена (демо).\nЗамовлення №${orderId} збережено.`);
                cart = {};
                updateCartUI();
                modal.style.display = 'none';
            }, 500);
        } catch (err) {
            alert('Помилка оплати. Спробуйте пізніше.');
        }
    });

    renderProducts();
    updateCartUI();
</script>
</body>
</html>
