<div id="cartModal" class="modal hidden">
    <div class="modal-content">
        <h2>Твоє замовлення</h2>
        <div id="cartItemsList"></div>
        <div class="total">Разом: <span id="cartTotalSum">0</span> грн</div>
        <hr>
        <div class="order-form">
            <input type="text" id="orderName" placeholder="Прізвище та Ім'я" required>
            <input type="tel" id="orderPhone" placeholder="Номер телефону" required>
            <input type="text" id="orderCity" placeholder="Місто доставки" required>
            <input type="text" id="orderPost" placeholder="№ Відділення Нової Пошти" required>
        </div>
        <button onclick="checkoutOrder()" class="checkout-btn">Оформити замовлення</button>
        <button onclick="toggleCartModal()" class="close-btn">Повернутись до покупок</button>
    </div>
</div>
