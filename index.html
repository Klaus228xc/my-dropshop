<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UA Drop | Магазин якісних товарів</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
        body{background:linear-gradient(145deg,#f9fafc 0%,#f0f2f5 100%);color:#1a1e2b}
        .header{background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(0,0,0,0.05)}
        .header-container{max-width:1400px;margin:0 auto;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
        .logo{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#1f2b4e,#2c3e66);-webkit-background-clip:text;background-clip:text;color:transparent}
        .header-actions{display:flex;gap:12px;align-items:center}
        .csv-btn{background:#10b981;color:white;border:none;padding:10px 20px;border-radius:60px;font-weight:600;cursor:pointer}
        .cart-icon{background:#fff;padding:10px 20px;border-radius:60px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid #eef2f8}
        .cart-count{background:#e63946;color:white;border-radius:40px;padding:2px 10px}
        .container{max-width:1400px;margin:2rem auto;padding:0 2rem}
        .catalog-title{font-size:2.2rem;font-weight:600;margin-bottom:2rem;background:linear-gradient(120deg,#1f2b4e,#3b4b72);-webkit-background-clip:text;background-clip:text;color:transparent}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2rem}
        .product-card{background:#fff;border-radius:28px;overflow:hidden;box-shadow:0 18px 30px -12px rgba(0,0,0,0.08);transition:0.25s;border:1px solid rgba(0,0,0,0.03);display:flex;flex-direction:column}
        .product-card:hover{transform:translateY(-6px)}
        .product-img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#f7f9fc}
        .product-info{padding:1.3rem 1.2rem 1.5rem;flex:1}
        .product-title{font-weight:600;font-size:1.1rem;margin-bottom:0.5rem}
        .product-price{font-size:1.5rem;font-weight:700;color:#1f2b4e;margin:0.5rem 0}
        .stock-badge{font-size:0.75rem;display:inline-block;padding:0.2rem 0.7rem;border-radius:40px;background:#eef2ff;color:#1f4f2b}
        .outofstock{background:#ffe8e8;color:#b91c1c}
        .add-to-cart{background:#1f2b4e;border:none;color:white;padding:0.8rem;border-radius:44px;font-weight:600;cursor:pointer;margin-top:auto}
        .add-to-cart:disabled{background:#b9c2d4;cursor:not-allowed}
        .loading-spinner{text-align:center;padding:4rem}
        .error-message{text-align:center;padding:3rem;background:#fff0f0;border-radius:40px;color:#b91c1c}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);backdrop-filter:blur(5px);z-index:200;justify-content:center;align-items:center}
        .modal-content{background:white;max-width:550px;width:90%;border-radius:40px;padding:2rem}
        .cart-items-list{max-height:300px;overflow-y:auto;margin:1rem 0}
        .cart-item{display:flex;justify-content:space-between;align-items:center;padding:0.8rem 0;border-bottom:1px solid #ecf0f4}
        .cart-item-qty{display:flex;gap:0.5rem;align-items:center}
        .cart-item-qty button{background:#f0f2f5;border:none;width:28px;height:28px;border-radius:30px;cursor:pointer}
        .cart-total{font-size:1.4rem;font-weight:800;text-align:right;margin:1rem 0;border-top:2px solid #eef2f8;padding-top:1rem}
        .payment-methods{display:flex;gap:1rem;margin:1rem 0;justify-content:center}
        .pay-btn{background:#2c6e2f;width:100%;padding:1rem;border:none;color:white;font-weight:700;border-radius:60px;cursor:pointer}
        .close-modal{float:right;font-size:1.7rem;cursor:pointer;background:none;border:none}
        .order-info{background:#f1f5f9;border-radius:24px;padding:1rem;margin:1rem 0}
        .order-info input,.order-info textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #cbd5e1;border-radius:20px}
        @media (max-width:680px){.container{padding:0 1rem}}
    </style>
</head>
<body>
<div class="header">
    <div class="header-container">
        <div class="logo">UA DROP</div>
        <div class="header-actions">
            <button id="exportCsvBtn" class="csv-btn">📥 Завантажити CSV</button>
            <div class="cart-icon" id="cartIcon">
                <span>🛒</span>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>
</div>
<div class="container">
    <div class="catalog-title">✨ Топ пропозиції</div>
    <div id="productsGrid" class="products-grid"><div class="loading-spinner">⏳ Завантаження товарів...</div></div>
</div>
<div id="cartModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn">&times;</button>
        <h2>Кошик</h2>
        <div id="cartItemsList" class="cart-items-list"></div>
        <div id="cartTotal" class="cart-total">Всього: 0 ₴</div>
        <div class="payment-methods">
            <label><input type="radio" name="paymentMethod" value="online" checked> 💳 Онлайн-оплата</label>
            <label><input type="radio" name="paymentMethod" value="cod"> 📦 Накладений платіж</label>
        </div>
        <div class="order-info">
            <input type="text" id="customerName" placeholder="Ваше ім'я та прізвище">
            <input type="tel" id="customerPhone" placeholder="Номер телефону">
            <textarea id="customerAddress" rows="2" placeholder="Адреса доставки (місто, відділення Нової Пошти)"></textarea>
        </div>
        <button id="checkoutButton" class="pay-btn">💳 Оформити замовлення</button>
    </div>
</div>
<footer style="text-align:center;padding:2rem;color:#6c7a8e">© UA Drop — якісні товари з доставкою по всій Україні</footer>

<script>
    const ADMIN_WHATSAPP = "380998261128";
    // Якщо проксі не працює, завантажте XML вручну і змініть на products.xml
    const XML_URL = "https://cors-anywhere.herokuapp.com/https://www.websklad.biz.ua/wp-content/uploads/current-Universalnaya.xml";
    let productsData = [];
    let cart = {};
    let selectedPayment = "online";

    async function loadProductsFromXML() {
        const res = await fetch(XML_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const xmlText = await res.text();
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlText, "application/xml");
        if (xmlDoc.querySelector("parsererror")) throw new Error("Помилка XML");
        let items = xmlDoc.querySelectorAll("offer");
        if (!items.length) items = xmlDoc.querySelectorAll("product");
        if (!items.length) throw new Error("Немає товарів");
        const products = [];
        for (let i=0; i<items.length; i++) {
            const item = items[i];
            const name = item.querySelector("name")?.textContent.trim() || "Без назви";
            let priceElem = item.querySelector("price") || item.querySelector("purchasePrice");
            let price = parseFloat(priceElem?.textContent.trim().replace(",",".") || "0");
            if (isNaN(price)) price = 0;
            let imgElem = item.querySelector("picture") || item.querySelector("image") || item.querySelector("url");
            let img = imgElem?.textContent.trim() || "";
            if (img && !img.startsWith("http")) img = "https://www.websklad.biz.ua" + img;
            if (!img) img = "https://placehold.co/400x400?text=No+Image";
            const sku = item.getAttribute("id") || item.querySelector("vendorCode")?.textContent || `prod_${i}`;
            let stock = "instock";
            const stockElem = item.querySelector("stock");
            if (stockElem && (stockElem.textContent.trim() === "0" || stockElem.textContent.trim() === "outofstock")) stock = "outofstock";
            products.push({ sku, name, price, img, stock });
        }
        return products;
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!productsData.length) { grid.innerHTML = '<div class="error-message">❌ Не вдалося завантажити товари</div>'; return; }
        grid.innerHTML = '';
        productsData.forEach(p => {
            const inStock = p.stock === 'instock';
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img class="product-img" src="${p.img}" alt="${escapeHtml(p.name)}" onerror="this.src='https://placehold.co/400x400?text=No+Image'">
                <div class="product-info">
                    <div class="product-title">${escapeHtml(p.name)}</div>
                    <div class="product-price">${p.price} ₴</div>
                    <span class="stock-badge ${!inStock ? 'outofstock' : ''}">${inStock ? '✓ В наявності' : '✗ Немає'}</span>
                    <button class="add-to-cart" data-sku="${p.sku}" ${!inStock ? 'disabled' : ''}>${inStock ? '➕ В кошик' : '❌ Недоступний'}</button>
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.add-to-cart').forEach(btn => btn.addEventListener('click', () => addToCart(btn.dataset.sku)));
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function addToCart(sku) { cart[sku] = (cart[sku]||0)+1; updateCartUI(); showToast('Товар додано', '#1f2b4e'); }
    function updateCartUI() {
        const totalItems = Object.values(cart).reduce((a,b)=>a+b,0);
        document.getElementById('cartCount').innerText = totalItems;
        const container = document.getElementById('cartItemsList');
        const totalSpan = document.getElementById('cartTotal');
        if (totalItems === 0) { container.innerHTML = '<div style="text-align:center;padding:2rem;">Кошик порожній</div>'; totalSpan.innerText = 'Всього: 0 ₴'; return; }
        let totalPrice = 0, html = '';
        for (let [sku, qty] of Object.entries(cart)) {
            const prod = productsData.find(p=>p.sku===sku);
            if (!prod) continue;
            totalPrice += prod.price * qty;
            html += `<div class="cart-item"><div class="cart-item-name">${escapeHtml(prod.name)}</div><div class="cart-item-price">${prod.price} ₴</div><div class="cart-item-qty"><button data-sku="${sku}" data-delta="-1">−</button><span>${qty}</span><button data-sku="${sku}" data-delta="1">+</button><button data-sku="${sku}" data-delta="-999">🗑</button></div></div>`;
        }
        container.innerHTML = html;
        totalSpan.innerText = `Всього: ${totalPrice} ₴`;
        document.querySelectorAll('.cart-item-qty button').forEach(btn => btn.addEventListener('click', () => {
            const sku = btn.dataset.sku;
            let delta = parseInt(btn.dataset.delta);
            if (delta === -999) delete cart[sku];
            else { const newQty = (cart[sku]||0) + delta; if (newQty <= 0) delete cart[sku]; else cart[sku] = newQty; }
            updateCartUI();
        }));
    }
    function showToast(msg, bg) { const t = document.createElement('div'); t.innerText=msg; t.style.cssText=`position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:${bg};color:#fff;padding:10px 20px;border-radius:60px;z-index:999`; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    function exportToCSV() {
        if (!productsData.length) return showToast('Немає даних', '#b91c1c');
        const headers = ["Назва","Ціна","URL зображення","SKU","Наявність"];
        const rows = productsData.map(p => [`"${p.name.replace(/"/g,'""')}"`, p.price, `"${p.img.replace(/"/g,'""')}"`, `"${p.sku.replace(/"/g,'""')}"`, p.stock==='instock'?'В наявності':'Немає']);
        const csv = "\uFEFF"+[headers,...rows].map(r=>r.join(",")).join("\n");
        const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
        const link = document.createElement('a'); link.href=URL.createObjectURL(blob); link.download="products.csv"; link.click(); URL.revokeObjectURL(link.href);
        showToast('CSV завантажено','#10b981');
    }

    (async function init() {
        try {
            productsData = await loadProductsFromXML();
            renderProducts();
        } catch(e) {
            document.getElementById('productsGrid').innerHTML = `<div class="error-message">⚠️ Помилка: ${e.message}<br><br>🔧 Завантажте XML вручну: <a href="https://www.websklad.biz.ua/wp-content/uploads/current-Universalnaya.xml" target="_blank">посилання</a>, збережіть як <code>products.xml</code> і змініть XML_URL на "products.xml"</div>`;
        }
    })();

    document.getElementById('exportCsvBtn').onclick = exportToCSV;
    const modal = document.getElementById('cartModal');
    document.getElementById('cartIcon').onclick = () => { updateCartUI(); modal.style.display='flex'; };
    document.getElementById('closeModalBtn').onclick = () => modal.style.display='none';
    window.onclick = e => { if(e.target===modal) modal.style.display='none'; };
    document.querySelectorAll('input[name="paymentMethod"]').forEach(r => r.onchange = e => selectedPayment = e.target.value);
    document.getElementById('checkoutButton').onclick = () => {
        if(Object.keys(cart).length===0) return showToast('Кошик порожній','#b91c1c');
        const name = document.getElementById('customerName').value.trim();
        const phone = document.getElementById('customerPhone').value.trim();
        const address = document.getElementById('customerAddress').value.trim();
        if(!name||!phone||!address) return showToast('Заповніть всі дані','#b91c1c');
        const total = Object.entries(cart).reduce((s,[sku,q])=>s+ (productsData.find(p=>p.sku===sku)?.price*q||0),0);
        const orderItems = Object.entries(cart).map(([sku,q])=>({name:productsData.find(p=>p.sku===sku).name, price:productsData.find(p=>p.sku===sku).price, quantity:q, total:productsData.find(p=>p.sku===sku).price*q}));
        const order = { items:orderItems, total, paymentMethod:selectedPayment==='online'?'Онлайн-оплата':'Накладений платіж', customer:{name,phone,address}, id:Date.now(), date:new Date().toLocaleString('uk-UA'), status:'Нове' };
        let orders = JSON.parse(localStorage.getItem('ua_drop_orders')||[]);
        orders.push(order); localStorage.setItem('ua_drop_orders',JSON.stringify(orders));
        let msg = `🛍 НОВЕ ЗАМОВЛЕННЯ #${order.id}\n📅 ${order.date}\n💳 ${order.paymentMethod}\n💰 ${order.total} грн\n\nТовари:\n`+order.items.map(i=>`• ${i.name} — ${i.quantity} шт. x ${i.price} грн = ${i.total} грн`).join('\n')+`\n\n👤 Клієнт:\nІм'я: ${name}\nТелефон: ${phone}\nАдреса: ${address}`;
        let phoneNum = ADMIN_WHATSAPP.replace(/[^0-9+]/g,''); if(!phoneNum.startsWith('+')) phoneNum='+'+phoneNum;
        window.open(`https://wa.me/${phoneNum}?text=${encodeURIComponent(msg)}`,'_blank');
        showToast('Замовлення відправлено','#2c6e2f');
        cart={}; updateCartUI(); modal.style.display='none';
    };
</script>
</body>
</html>
