<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UADrop Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">UA<span>Drop</span></div>
        <input type="text" id="searchInput" placeholder="Пошук товарів..." oninput="searchProducts(this.value)">
    </header>

    <!-- ТУТ БУДУТ ТОВАРЫ -->
    <main id="products" class="grid"></main>

    <!-- КНОПКА КОРЗИНЫ -->
    <div id="cartToggle" onclick="toggleCartModal()">
        🛒 <span id="cartCountGlobal">0</span>
    </div>

    <!-- ОКНО ЗАКАЗА -->
    <div id="cartModal" class="modal hidden">
        <div class="modal-content">
            <h2>Твоє замовлення</h2>
            <div id="cartItemsList"></div>
            <div class="total">Разом: <span id="cartTotalSum">0</span> грн</div>
            <hr>
            <div class="order-form">
                <input type="text" id="orderName" placeholder="Прізвище та Ім'я">
                <input type="tel" id="orderPhone" placeholder="Номер телефону">
                <input type="text" id="orderCity" placeholder="Місто доставки">
                <input type="text" id="orderPost" placeholder="№ Відділення Нової Пошти">
            </div>
            <button onclick="checkoutOrder()" class="checkout-btn">Оформити замовлення</button>
            <button onclick="toggleCartModal()" class="close-btn">Повернутись</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
