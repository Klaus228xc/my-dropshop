<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UADrop Store</title>
    <style>
        /* Тут ваші стилі (як у попередніх повідомленнях) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; color: white; font-family: system-ui; padding-bottom: 90px; }
        header { background: #1e293b; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; border-bottom: 3px solid #38bdf8; }
        .logo { font-size: 1.8rem; font-weight: 800; }
        .logo span { color: #38bdf8; }
        #searchInput { padding: 12px 18px; border-radius: 40px; border: none; width: 280px; background: #0f172a; color: white; border: 1px solid #334155; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; padding: 28px 24px; max-width: 1400px; margin: 0 auto; }
        .card { background: #1e293b; border-radius: 20px; border: 1px solid #334155; transition: 0.2s; }
        .card:hover { transform: translateY(-6px); border-color: #38bdf8; }
        .card img { width: 100%; height: 220px; object-fit: contain; background: white; padding: 12px; }
        .card h3 { padding: 12px 14px 4px; font-size: 1rem; }
        .price { font-size: 1.6rem; font-weight: 800; color: #38bdf8; padding: 6px 14px; }
        .buy-btn { background: #38bdf8; border: none; padding: 12px; margin: 12px 14px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; width: calc(100% - 28px); }
        #cartToggle { position: fixed; bottom: 24px; right: 24px; background: #38bdf8; width: 68px; height: 68px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 200; gap: 6px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal.hidden { display: none; }
        .modal-content { background: #1e293b; padding: 24px; border-radius: 28px; width: 92%; max-width: 480px; max-height: 88vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; padding: 12px 8px; border-bottom: 1px solid #334155; }
        .remove-item { background: #dc2626; border: none; color: white; border-radius: 30px; width: 30px; height: 30px; cursor: pointer; }
        .total { font-size: 1.5rem; text-align: right; margin: 16px 0; border-top: 2px solid #38bdf8; padding-top: 12px; }
        .order-form input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 40px; border: 1px solid #334155; background: #0f172a; color: white; }
        .checkout-btn { background: #25D366; color: black; width: 100%; padding: 14px; border-radius: 40px; margin: 12px 0 8px; font-weight: bold; cursor: pointer; }
        .close-btn { background: #475569; color: white; width: 100%; padding: 12px; border-radius: 40px; cursor: pointer; }
        .loading, .error-msg { text-align: center; padding: 60px; }
        .error-msg { color: #f87171; }
        @media (max-width: 640px) { .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } }
    </style>
</head>
<body>
    <header>
        <div class="logo">UA<span>Drop</span></div>
        <input type="text" id="searchInput" placeholder="Пошук товарів...">
    </header>
    <main id="products" class="grid"><div class="loading">Завантаження...</div></main>
    <div id="cartToggle">🛒 <span id="cartCountGlobal">0</span></div>
    <div id="cartModal" class="modal hidden">
        <div class="modal-content">
            <h2>Кошик</h2>
            <div id="cartItemsList"></div>
            <div class="total">Разом: <span id="cartTotalSum">0</span> грн</div>
            <div class="order-form">
                <input type="text" id="orderName" placeholder="ПІБ">
                <input type="tel" id="orderPhone" placeholder="Телефон">
                <input type="text" id="orderCity" placeholder="Місто">
                <input type="text" id="orderPost" placeholder="№ відділення НП">
            </div>
            <button onclick="checkoutOrder()" class="checkout-btn">Оформити WhatsApp</button>
            <button onclick="toggleCartModal()" class="close-btn">Закрити</button>
        </div>
    </div>
    <script>
        // ========== КОНФІГ ==========
        const MY_PHONE = "380XXXXXXXXX"; // ЗАМІНІТЬ НА СВІЙ НОМЕР
        let allProducts = [];
        let cart = [];

        // ========== ЗАВАНТАЖЕННЯ ТОВАРІВ З ЛОКАЛЬНОГО JSON ==========
        async function loadProducts() {
            try {
                // СПРОБУЙТЕ ЗАВАНТАЖИТИ JSON (ви маєте його створити)
                const response = await fetch('products.json');
                if (!response.ok) throw new Error('Файл products.json не знайдено');
                const data = await response.json();
                allProducts = data;
                renderProducts(allProducts);
            } catch (err) {
                document.getElementById('products').innerHTML = `<div class="error-msg">
                    ❌ Не вдалося завантажити товари.<br>
                    Переконайтеся, що файл <strong>products.json</strong> існує в корені сайту.
                </div>`;
                console.error(err);
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('products');
            if (!products.length) { container.innerHTML = '<div class="error-msg">Товарів немає</div>'; return; }
            container.innerHTML = '';
            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${p.picture}" onerror="this.src='https://via.placeholder.com/300'">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price} ₴</div>
                    <button class="buy-btn" data-id="${p.id}">В кошик</button>
                `;
                card.querySelector('.buy-btn').onclick = () => addToCart(p);
                container.appendChild(card);
            });
        }

        function addToCart(product) {
            cart.push(product);
            document.getElementById('cartCountGlobal').innerText = cart.length;
            showToast(`✅ ${product.name.substring(0, 40)} додано`);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            document.getElementById('cartCountGlobal').innerText = cart.length;
            if (!document.getElementById('cartModal').classList.contains('hidden')) renderCartModal();
            showToast(`🗑 Видалено`);
        }

        function renderCartModal() {
            const listDiv = document.getElementById('cartItemsList');
            let total = 0;
            if (!cart.length) { listDiv.innerHTML = '<div class="empty-cart">Кошик порожній</div>'; document.getElementById('cartTotalSum').innerText = '0'; return; }
            listDiv.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>${item.price} ₴</span>
                    <button class="remove-item" onclick="removeFromCart(${i})">✖</button>
                </div>
            `).join('');
            total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cartTotalSum').innerText = total;
        }

        window.toggleCartModal = () => {
            const modal = document.getElementById('cartModal');
            if (modal.classList.contains('hidden')) {
                renderCartModal();
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        };

        window.checkoutOrder = () => {
            const name = document.getElementById('orderName').value.trim();
            const phone = document.getElementById('orderPhone').value.trim();
            const city = document.getElementById('orderCity').value.trim();
            const post = document.getElementById('orderPost').value.trim();
            if (!name || !phone || !city || !post) return alert('Заповніть всі поля');
            if (!cart.length) return alert('Кошик порожній');
            let msg = `📦 ЗАМОВЛЕННЯ\nІм'я: ${name}\nТел: ${phone}\nМісто: ${city}\nВідділення: ${post}\n\nТовари:\n`;
            cart.forEach((item, i) => msg += `${i+1}. ${item.name} - ${item.price} грн\n`);
            msg += `\nСума: ${cart.reduce((s,i)=>s+i.price,0)} грн`;
            window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        // Пошук
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if (!q) renderProducts(allProducts);
            else renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q)));
        });

        function showToast(msg) {
            let t = document.querySelector('.toast-msg');
            if (t) t.remove();
            t = document.createElement('div');
            t.className = 'toast-msg';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        loadProducts();
    </script>
</body>
</html>
