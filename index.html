ний бокс для зберігання косметики з висувними ящиками і дзеркалом органайзер","<div class=""n2-header"">\r\n<div class=""n2-pol-top"">\r\n<p><strong>Бокс для зберігання косметики із дзеркалом UKC 7009</strong></p>\r\n<p>Жінка має бути прекрасною! &ndash; це істина, яку знають усі. Краса ця значною мірою визначається безліччю косметичних засобів. Помада, туш для вій, лаки для нігтів, засоби для догляду за зубами та волоссям, парфуми, ватяні кульки, лосьйони, різні прикраси &mdash; всього не перерахувати. Зрозуміло, все це можна придбати, але де зберігати це багатство?</p>\r\n<p>Органайзери допоможуть Вам не тільки заощадити час на пошуки потрібних баночок, пензликів та тюбиків, але й зберегти порядок та чистоту на туалетному столику, на стільниці у ванній, на комоді, на підвіконні та на інших відкритих поверхнях.</p>\r\n<ul>\r\n<li>Простір та економія часу: Забудьте ритися у сумці для пошуку потрібного засобу макіяжу.</li>\r\n<li>Тримайте косметичні продукти або ювелірні вироби завжди під рукою.</li>\r\n<li>Ідеально підходить для відображення на вашому туалетному столику або у ванній кімнаті.</li>\r\n<li>Прозорий дизайн дозволяє легко побачити вміст.</li>\r\n<li>Позбавтеся безладу та безладдя на вашому столі</li>\r\n</ul>\r\n<p><strong>Характеристики:</strong></p>\r\n<ul>\r\n<li>3 місткі відкриті осередки;</li>\r\n<li>1 висувна скринька;</li>\r\n<li>Розміри: 20.5 x 15.5 x 28.5 см;</li>\r\n<li>Вага 1 кг.</li>\r\n<li>Комплектація:</li>\r\n<li>Органайзер із дзеркалом;</li>\r\n<li>Упаковка.</li>\r\n</ul>\r\n</div>\r\n</div>","Краса і здоров'я",Органайзери`;
    
    // --- парсинг CSV с учётом кавычек, переносов строк внутри полей ---
    function parseCSV(csvText) {
        const rows = [];
        let currentRow = [];
        let currentField = '';
        let inQuotes = false;
        let i = 0;
        const len = csvText.length;
        while (i < len) {
            const ch = csvText[i];
            if (ch === '"') {
                if (inQuotes && csvText[i+1] === '"') {
                    currentField += '"';
                    i++;
                } else {
                    inQuotes = !inQuotes;
                }
            } else if (ch === ',' && !inQuotes) {
                currentRow.push(currentField.trim());
                currentField = '';
            } else if ((ch === '\n' || (ch === '\r' && csvText[i+1] === '\n')) && !inQuotes) {
                if (ch === '\r') i++;
                currentRow.push(currentField.trim());
                if (currentRow.length > 1 || currentRow[0] !== '') rows.push(currentRow);
                currentRow = [];
                currentField = '';
            } else {
                currentField += ch;
            }
            i++;
        }
        if (currentField || currentRow.length) {
            currentRow.push(currentField.trim());
            if (currentRow.length > 1 || currentRow[0] !== '') rows.push(currentRow);
        }
        if (rows.length === 0) return [];
        const headers = rows[0].map(h => h.replace(/^"|"$/g, '').trim());
        const products = [];
        for (let i=1; i<rows.length; i++) {
            const obj = {};
            for (let j=0; j<headers.length; j++) {
                let val = rows[i][j] || '';
                val = val.replace(/^"|"$/g, '');
                obj[headers[j]] = val;
            }
            if (obj["Название товара"] && obj["Артикул"]) products.push(obj);
        }
        return products;
    }
    
    let allProducts = [];
    let currentProducts = [];
    
    // элементы DOM
    const grid = document.getElementById('productsGrid');
    const searchInput = document.getElementById('searchInput');
    const categoryFilter = document.getElementById('categoryFilter');
    const availabilityFilter = document.getElementById('availabilityFilter');
    const sortPriceBtn = document.getElementById('sortPriceBtn');
    const resetBtn = document.getElementById('resetFiltersBtn');
    const statsSpan = document.getElementById('stats-counter');
    
    let sortAscending = true;
    
    function updateCategories(products) {
        const cats = new Set();
        products.forEach(p => {
            if (p["Категории товара"]) cats.add(p["Категории товара"]);
        });
        const sorted = Array.from(cats).sort();
        categoryFilter.innerHTML = '<option value="all">Все категории</option>';
        sorted.forEach(c => {
            categoryFilter.innerHTML += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`;
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    function renderProducts(productsArray) {
        if (!productsArray.length) {
            grid.innerHTML = '<div class="no-results">😕 Ничего не найдено. Попробуйте изменить фильтры.</div>';
            statsSpan.innerText = `Товаров: 0`;
            return;
        }
        let html = '';
        for (let p of productsArray) {
            const title = p["Название товара"] || 'Без названия';
            const art = p["Артикул"] || '';
            const category = p["Категории товара"] || 'Разное';
            const price = p["Рекомендовання розничная цена"] || '0';
            const partnerPrice = p["Дроп цена для партнера"] || '0';
            const stock = p["Наличие"] || 'outofstock';
            const images = p["Изображения"] || '';
            const firstImg = images.split(',')[0] || 'https://placehold.co/300x200?text=Нет+фото';
            const stockText = stock === 'instock' ? 'В наличии' : 'Нет в наличии';
            const stockClass = stock === 'instock' ? 'in-stock' : 'out-stock';
            html += `
                <div class="product-card">
                    <div class="img-wrapper">
                        <img class="product-img" src="${escapeHtml(firstImg)}" loading="lazy" alt="${escapeHtml(title)}" onerror="this.src='https://placehold.co/300x200?text=Фото+недоступно'">
                    </div>
                    <div class="product-info">
                        <div class="product-category">${escapeHtml(category)}</div>
                        <div class="product-title">${escapeHtml(title)} <span style="font-weight:normal; color:#6c7a91;"> (${escapeHtml(art)})</span></div>
                        <div class="price-row">
                            <span class="price">${Number(price).toLocaleString()} ₴</span>
                            <span class="old-price">Дроп: ${Number(partnerPrice).toLocaleString()} ₴</span>
                        </div>
                        <div class="stock ${stockClass}">${stockText}</div>
                        <button class="btn-detail" data-art="${escapeHtml(art)}">📋 Подробнее</button>
                    </div>
                </div>
            `;
        }
        grid.innerHTML = html;
        statsSpan.innerText = `Товаров: ${productsArray.length}`;
        document.querySelectorAll('.btn-detail').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const artCode = btn.getAttribute('data-art');
                const product = allProducts.find(p => p["Артикул"] === artCode);
                if (product) {
                    alert(`📦 ${product["Название товара"]}\nАртикул: ${product["Артикул"]}\nКатегория: ${product["Категории товара"]}\nЦена: ${product["Рекомендовання розничная цена"]} грн\nДроп-цена: ${product["Дроп цена для партнера"]} грн\nНаличие: ${product["Наличие"] === 'instock' ? 'В наличии' : 'Нет в наличии'}`);
                } else {
                    alert("Информация временно недоступна");
                }
            });
        });
    }
    
    function filterAndSort() {
        let filtered = [...allProducts];
        const searchTerm = searchInput.value.toLowerCase().trim();
        if (searchTerm) {
            filtered = filtered.filter(p => {
                return (p["Название товара"] || '').toLowerCase().includes(searchTerm) ||
                       (p["Артикул"] || '').toLowerCase().includes(searchTerm) ||
                       (p["Категории товара"] || '').toLowerCase().includes(searchTerm);
            });
        }
        const catValue = categoryFilter.value;
        if (catValue !== 'all') {
            filtered = filtered.filter(p => (p["Категории товара"] || '') === catValue);
        }
        const avail = availabilityFilter.value;
        if (avail !== 'all') {
            filtered = filtered.filter(p => p["Наличие"] === avail);
        }
        if (sortPriceBtn.getAttribute('data-active') === 'true') {
            filtered.sort((a,b) => {
                const priceA = parseFloat(a["Рекомендовання розничная цена"] || 0);
                const priceB = parseFloat(b["Рекомендовання розничная цена"] || 0);
                return sortAscending ? priceA - priceB : priceB - priceA;
            });
        }
        currentProducts = filtered;
        renderProducts(currentProducts);
    }
    
    function resetFilters() {
        searchInput.value = '';
        categoryFilter.value = 'all';
        availabilityFilter.value = 'all';
        sortPriceBtn.setAttribute('data-active', 'false');
        sortPriceBtn.style.background = '#f0f4fa';
        sortAscending = true;
        filterAndSort();
    }
    
    sortPriceBtn.addEventListener('click', () => {
        const isActive = sortPriceBtn.getAttribute('data-active') === 'true';
        if (!isActive) {
            sortPriceBtn.setAttribute('data-active', 'true');
            sortAscending = true;
            sortPriceBtn.style.background = '#e0eaff';
        } else {
            sortAscending = !sortAscending;
        }
        filterAndSort();
    });
    
    searchInput.addEventListener('input', filterAndSort);
    categoryFilter.addEventListener('change', filterAndSort);
    availabilityFilter.addEventListener('change', filterAndSort);
    resetBtn.addEventListener('click', resetFilters);
    
    try {
        allProducts = parseCSV(csvRawData);
        if (allProducts.length === 0) throw new Error("Нет данных");
        updateCategories(allProducts);
        currentProducts = [...allProducts];
        renderProducts(currentProducts);
    } catch(e) {
        console.error(e);
        grid.innerHTML = '<div class="no-results">⚠️ Ошибка загрузки данных. Проверьте CSV.</div>';
        statsSpan.innerText = 'Ошибка';
    }
</script>
