<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>UA Drop | Магазин якісних товарів</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f9fafc 0%, #f0f2f5 100%);
            color: #1a1e2b;
        }

        .header {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1f2b4e, #2c3e66);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .csv-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .csv-btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        .cart-icon {
            background: #ffffff;
            padding: 10px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #eef2f8;
        }
        .cart-icon:hover {
            background: #fefefe;
            box-shadow: 0 12px 22px rgba(0,0,0,0.08);
            transform: translateY(-2px);
        }
        .cart-icon span {
            font-weight: 600;
            font-size: 1.2rem;
        }
        .cart-count {
            background: #e63946;
            color: white;
            border-radius: 40px;
            padding: 2px 10px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .catalog-title {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            letter-spacing: -0.3px;
            background: linear-gradient(120deg, #1f2b4e, #3b4b72);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: #ffffff;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 18px 30px -12px rgba(0,0,0,0.08);
            transition: all 0.25s ease;
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 28px 38px -14px rgba(0,0,0,0.15);
        }
        .product-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #f7f9fc;
            border-bottom: 1px solid #edf2f7;
        }
        .product-info {
            padding: 1.3rem 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .product-title {
            font-weight: 600;
            font-size: 1.1rem;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            color: #121826;
        }
        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2b4e;
            margin: 0.5rem 0;
        }
        .stock-badge {
            font-size: 0.75rem;
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            background: #eef2ff;
            color: #1f4f2b;
            width: fit-content;
            margin-bottom: 1rem;
        }
        .outofstock {
            background: #ffe8e8;
            color: #b91c1c;
        }
        .add-to-cart {
            background: #1f2b4e;
            border: none;
            color: white;
            padding: 0.8rem 0;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .add-to-cart:hover {
            background: #2c3e66;
            transform: scale(0.98);
        }
        .add-to-cart:disabled {
            background: #b9c2d4;
            cursor: not-allowed;
        }
        .loading-spinner {
            text-align: center;
            padding: 4rem;
            font-size: 1.2rem;
            color: #1f2b4e;
        }
        .error-message {
            text-align: center;
            padding: 3rem;
            background: #fff0f0;
            border-radius: 40px;
            color: #b91c1c;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            max-width: 550px;
            width: 90%;
            border-radius: 40px;
            padding: 2rem;
            box-shadow: 0 40px 60px rgba(0,0,0,0.2);
            animation: fadeInUp 0.25s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .cart-items-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 1rem 0;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            border-bottom: 1px solid #ecf0f4;
        }
        .cart-item-name {
            font-weight: 500;
            flex: 2;
        }
        .cart-item-price {
            font-weight: 600;
            margin: 0 1rem;
        }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .cart-item-qty button {
            background: #f0f2f5;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-total {
            font-size: 1.4rem;
            font-weight: 800;
            text-align: right;
            margin: 1rem 0;
            border-top: 2px solid #eef2f8;
            padding-top: 1rem;
        }
        .payment-methods {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            justify-content: center;
        }
        .payment-methods label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f8fafd;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            border: 1px solid #e2e8f0;
        }
        .payment-methods input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .pay-btn {
            background: #2c6e2f;
            width: 100%;
            padding: 1rem;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
        }
        .pay-btn:hover {
            background: #1e4a21;
            transform: scale(0.98);
        }
        .close-modal {
            float: right;
            font-size: 1.7rem;
            cursor: pointer;
            background: none;
            border: none;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #6c7a8e;
            font-size: 0.8rem;
        }
        .order-info {
            background: #f1f5f9;
            border-radius: 24px;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        .order-info input, .order-info textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        @media (max-width: 680px) {
            .container { padding: 0 1rem; }
            .product-title { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="header">
    <div class="header-container">
        <div class="logo">UA DROP</div>
        <div class="header-actions">
            <button id="exportCsvBtn" class="csv-btn">📥 Завантажити CSV</button>
            <div class="cart-icon" id="cartIcon">
                <span>🛒</span>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="catalog-title">✨ Топ пропозиції</div>
    <div id="productsGrid" class="products-grid">
        <div class="loading-spinner">⏳ Завантаження товарів...</div>
    </div>
</div>

<!-- Модалка корзини -->
<div id="cartModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn">&times;</button>
        <h2>Кошик</h2>
        <div id="cartItemsList" class="cart-items-list"></div>
        <div id="cartTotal" class="cart-total">Всього: 0 ₴</div>

        <div class="payment-methods">
            <label>
                <input type="radio" name="paymentMethod" value="online" checked> 💳 Онлайн-оплата
            </label>
            <label>
                <input type="radio" name="paymentMethod" value="cod"> 📦 Накладений платіж
            </label>
        </div>

        <div id="contactFields" class="order-info">
            <input type="text" id="customerName" placeholder="Ваше ім'я та прізвище" autocomplete="name">
            <input type="tel" id="customerPhone" placeholder="Номер телефону" autocomplete="tel">
            <textarea id="customerAddress" rows="2" placeholder="Адреса доставки (місто, відділення Нової Пошти / адреса)"></textarea>
        </div>

        <button id="checkoutButton" class="pay-btn">💳 Оформити замовлення</button>
    </div>
</div>

<footer>© UA Drop — якісні товари з доставкою по всій Україні</footer>

<script>
    // ================= НАЛАШТУВАННЯ =================
    const ADMIN_WHATSAPP = "380998261128";   // ЗМІНІТЬ НА СВІЙ НОМЕР
    // Виберіть джерело даних:
    // 1. Для роботи через проксі (може блокуватись) – залиште так:
    const XML_URL = "https://cors-anywhere.herokuapp.com/https://www.websklad.biz.ua/wp-content/uploads/current-Universalnaya.xml";
    // 2. Для стабільної роботи: завантажте XML вручну, збережіть як "products.xml" і розкоментуйте наступний рядок:
    // const XML_URL = "products.xml";
    // ================================================

    let productsData = [];
    let cart = {};
    let selectedPayment = "online";

    async function loadProductsFromXML() {
        const gridContainer = document.getElementById('productsGrid');
        try {
            const response = await fetch(XML_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const xmlText = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "application/xml");
            const parseError = xmlDoc.querySelector("parsererror");
            if (parseError) throw new Error("Помилка структури XML");

            let items = xmlDoc.querySelectorAll("offer");
            if (items.length === 0) items = xmlDoc.querySelectorAll("product");
            if (items.length === 0) throw new Error("У XML немає товарів");

            const products = [];
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                const nameElem = item.querySelector("name");
                const name = nameElem ? nameElem.textContent.trim() : "Без назви";
                
                let priceElem = item.querySelector("price");
                if (!priceElem) priceElem = item.querySelector("purchasePrice");
                let priceRaw = priceElem ? priceElem.textContent.trim() : "0";
                let price = parseFloat(priceRaw.replace(",", "."));
                if (isNaN(price)) price = 0;
                
                let imgElem = item.querySelector("picture");
                if (!imgElem) imgElem = item.querySelector("image");
                if (!imgElem) imgElem = item.querySelector("url");
                let imgUrl = imgElem ? imgElem.textContent.trim() : "";
                if (imgUrl && !imgUrl.startsWith("http")) {
                    imgUrl = "https://www.websklad.biz.ua" + imgUrl;
                }
                if (!imgUrl) imgUrl = "https://placehold.co/400x400?text=No+Image";
                
                let sku = item.getAttribute("id") || item.querySelector("vendorCode")?.textContent || `prod_${i}`;
                let stockElem = item.querySelector("stock");
                let stock = "instock";
                if (stockElem) {
                    let stockVal = stockElem.textContent.trim();
                    if (stockVal === "0" || stockVal === "outofstock") stock = "outofstock";
                }
                products.push({ sku, name, price, img: imgUrl, stock });
            }
            return products;
        } catch (err) {
            console.error(err);
            throw err;
        }
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!grid) return;
        if (!productsData.length) {
            grid.innerHTML = '<div class="error-message">❌ Товари не завантажились. Перевірте з’єднання або спробуйте пізніше.</div>';
            return;
        }
        grid.innerHTML = '';
        productsData.forEach(prod => {
            const inStock = prod.stock === 'instock';
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img class="product-img" src="${prod.img}" alt="${escapeHtml(prod.name)}" loading="lazy" onerror="this.src='https://placehold.co/400x400?text=No+Image'">
                <div class="product-info">
                    <div class="product-title">${escapeHtml(prod.name)}</div>
                    <div class="product-price">${prod.price} ₴</div>
                    <span class="stock-badge ${!inStock ? 'outofstock' : ''}">${inStock ? '✓ В наявності' : '✗ Немає'}</span>
                    <button class="add-to-cart" data-sku="${prod.sku}" ${!inStock ? 'disabled' : ''}>${inStock ? '➕ В кошик' : '❌ Недоступний'}</button>
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const sku = btn.dataset.sku;
                addToCart(sku);
            });
        });
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function addToCart(sku) {
        if (cart[sku]) cart[sku]++;
        else cart[sku] = 1;
        updateCartUI();
        showToast('Товар додано до кошика', '#1f2b4e');
    }

    function updateCartUI() {
        const totalItems = Object.values(cart).reduce((a,b) => a+b, 0);
        const cartCountSpan = document.getElementById('cartCount');
        if (cartCountSpan) cartCountSpan.innerText = totalItems;

        const cartContainer = document.getElementById('cartItemsList');
        const totalSpan = document.getElementById('cartTotal');
        if (!cartContainer) return;

        if (totalItems === 0) {
            cartContainer.innerHTML = '<div style="text-align:center; padding:2rem;">Кошик порожній 🛒</div>';
            totalSpan.innerText = 'Всього: 0 ₴';
            return;
        }

        let totalPrice = 0;
        let html = '';
        for (let [sku, qty] of Object.entries(cart)) {
            const product = productsData.find(p => p.sku === sku);
            if (!product) continue;
            const itemTotal = product.price * qty;
            totalPrice += itemTotal;
            html += `
                <div class="cart-item">
                    <div class="cart-item-name">${escapeHtml(product.name)}</div>
                    <div class="cart-item-price">${product.price} ₴</div>
                    <div class="cart-item-qty">
                        <button data-sku="${sku}" data-delta="-1">−</button>
                        <span>${qty}</span>
                        <button data-sku="${sku}" data-delta="1">+</button>
                        <button data-sku="${sku}" data-delta="-999" style="background:#ffe0e0;">🗑</button>
                    </div>
                </div>
            `;
        }
        cartContainer.innerHTML = html;
        totalSpan.innerText = `Всього: ${totalPrice} ₴`;

        document.querySelectorAll('.cart-item-qty button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const sku = btn.dataset.sku;
                let delta = parseInt(btn.dataset.delta);
                if (isNaN(delta)) return;
                if (delta === -999) {
                    delete cart[sku];
                } else {
                    const newQty = (cart[sku] || 0) + delta;
                    if (newQty <= 0) delete cart[sku];
                    else cart[sku] = newQty;
                }
                updateCartUI();
            });
        });
    }

    function showToast(msg, bgColor) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = bgColor;
        toast.style.color = 'white';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '60px';
        toast.style.fontWeight = '500';
        toast.style.zIndex = '999';
        toast.style.boxShadow = '0 10px 20px rgba(0,0,0,0.2)';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function exportToCSV() {
        if (!productsData.length) {
            showToast('Немає даних для експорту', '#b91c1c');
            return;
        }
        const headers = ["Назва товару", "Ціна (грн)", "URL зображення", "SKU", "Наявність"];
        const rows = productsData.map(p => [
            `"${p.name.replace(/"/g, '""')}"`,
            p.price,
            `"${p.img.replace(/"/g, '""')}"`,
            `"${p.sku.replace(/"/g, '""')}"`,
            p.stock === 'instock' ? 'В наявності' : 'Немає'
        ]);
        const csvContent = [headers, ...rows].map(row => row.join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", "products.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast('CSV файл завантажено', '#10b981');
    }

    async function init() {
        const gridContainer = document.getElementById('productsGrid');
        try {
            const products = await loadProductsFromXML();
            productsData = products;
            renderProducts();
        } catch (err) {
            gridContainer.innerHTML = `<div class="error-message">
                ⚠️ Не вдалося завантажити товари: ${err.message}<br><br>
                🔧 <strong>Рішення:</strong> завантажте XML вручну 
                <a href="https://www.websklad.biz.ua/wp-content/uploads/current-Universalnaya.xml" target="_blank">за посиланням</a>, 
                збережіть як <code>products.xml</code> у папку з сайтом, і в коді замініть <code>XML_URL</code> на <code>"products.xml"</code>.
            </div>`;
        }
    }

    // ---- Модалка та оформлення замовлення ----
    const modal = document.getElementById('cartModal');
    const cartIcon = document.getElementById('cartIcon');
    const closeModalBtn = document.getElementById('closeModalBtn');

    cartIcon?.addEventListener('click', () => {
        updateCartUI();
        modal.style.display = 'flex';
    });
    closeModalBtn?.addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

    const radioOnline = document.querySelector('input[value="online"]');
    const radioCod = document.querySelector('input[value="cod"]');
    radioOnline?.addEventListener('change', () => { selectedPayment = 'online'; });
    radioCod?.addEventListener('change', () => { selectedPayment = 'cod'; });

    const checkoutBtn = document.getElementById('checkoutButton');
    checkoutBtn?.addEventListener('click', async () => {
        const items = Object.entries(cart);
        if (items.length === 0) {
            showToast('Кошик порожній, додайте товари', '#b91c1c');
            return;
        }

        const name = document.getElementById('customerName')?.value.trim();
        const phone = document.getElementById('customerPhone')?.value.trim();
        const address = document.getElementById('customerAddress')?.value.trim();
        if (!name || !phone || !address) {
            showToast('Будь ласка, заповніть всі контактні дані (імʼя, телефон, адреса)', '#b91c1c');
            return;
        }

        const total = Object.entries(cart).reduce((sum, [sku, qty]) => {
            const prod = productsData.find(p => p.sku === sku);
            return sum + (prod ? prod.price * qty : 0);
        }, 0);

        const orderItems = items.map(([sku, qty]) => {
            const prod = productsData.find(p => p.sku === sku);
            return { name: prod.name, sku, price: prod.price, quantity: qty, total: prod.price * qty };
        });

        const orderDetails = {
            items: orderItems,
            total: total,
            paymentMethod: selectedPayment === 'online' ? 'Онлайн-оплата' : 'Накладений платіж',
            customer: { name, phone, address }
        };

        function saveOrder(orderData) {
            let orders = JSON.parse(localStorage.getItem('ua_drop_orders')) || [];
            orderData.id = Date.now();
            orderData.date = new Date().toLocaleString('uk-UA');
            orderData.status = 'Нове';
            orders.push(orderData);
            localStorage.setItem('ua_drop_orders', JSON.stringify(orders));
            return orderData.id;
        }

        function sendOrderToWhatsApp(order) {
            if (!ADMIN_WHATSAPP) return;
            let message = `🛍 *НОВЕ ЗАМОВЛЕННЯ #${order.id}* 🛍\n📅 Дата: ${order.date}\n💳 Оплата: ${order.paymentMethod}\n💰 Сума: ${order.total.toFixed(2)} грн\n\n📦 *Товари:*\n`;
            order.items.forEach(item => {
                message += `• ${item.name} — ${item.quantity} шт. x ${item.price} грн = ${item.total} грн\n`;
            });
            message += `\n👤 *Клієнт:*\nІм'я: ${order.customer.name}\nТелефон: ${order.customer.phone}\nАдреса: ${order.customer.address}\n🔗 Статус: ${order.status}`;
            const encodedMessage = encodeURIComponent(message);
            let phone = ADMIN_WHATSAPP.replace(/[^0-9+]/g, '');
            if (!phone.startsWith('+')) phone = '+' + phone;
            window.open(`https://wa.me/${phone}?text=${encodedMessage}`, '_blank');
        }

        if (selectedPayment === 'cod') {
            const orderId = saveOrder(orderDetails);
            orderDetails.id = orderId;
            sendOrderToWhatsApp(orderDetails);
            showToast(`✅ Замовлення №${orderId} оформлено. Деталі надіслано адміністратору.`, '#2c6e2f');
            cart = {};
            updateCartUI();
            modal.style.display = 'none';
            return;
        }

        try {
            showToast('Перенаправлення на оплату...', '#2c6e2f');
            setTimeout(() => {
                const orderId = saveOrder(orderDetails);
                orderDetails.id = orderId;
                sendOrderToWhatsApp(orderDetails);
                alert(`✅ Онлайн-оплата на суму ${total} грн успішно завершена (демо-режим).\nЗамовлення №${orderId} збережено та надіслано адміністратору.`);
                cart = {};
                updateCartUI();
                modal.style.display = 'none';
            }, 500);
        } catch (err) {
            alert('Помилка при ініціалізації оплати. Спробуйте пізніше.');
        }
    });

    document.getElementById('exportCsvBtn')?.addEventListener('click', exportToCSV);
    init();
</script>
</body>
</html>
