<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель UA Drop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f1f5f9;
            padding: 2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: #1e293b;
        }
        .stats {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            border-radius: 24px;
            padding: 1rem 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            flex: 1;
        }
        .stat-card h3 {
            font-size: 0.9rem;
            color: #475569;
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
        }
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters input, .filters select {
            padding: 0.5rem 1rem;
            border-radius: 40px;
            border: 1px solid #cbd5e1;
            background: white;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-collapse: collapse;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f8fafc;
            font-weight: 600;
        }
        .status-select {
            padding: 0.25rem 0.5rem;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            background: white;
        }
        .btn-delete {
            background: #fee2e2;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            color: #b91c1c;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-delete:hover {
            background: #fecaca;
        }
        .order-details {
            cursor: pointer;
            color: #2563eb;
            text-decoration: underline;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            max-width: 500px;
            width: 90%;
            border-radius: 32px;
            padding: 2rem;
            max-height: 80vh;
            overflow-y: auto;
        }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            th, td { padding: 0.5rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 Адмін-панель замовлень</h1>
    <div class="stats" id="stats"></div>
    <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 Пошук за ім'ям, телефоном, товаром" style="flex:2;">
        <select id="statusFilter">
            <option value="all">Всі статуси</option>
            <option value="Нове">Нове</option>
            <option value="В обробці">В обробці</option>
            <option value="Відправлено">Відправлено</option>
            <option value="Виконано">Виконано</option>
            <option value="Скасовано">Скасовано</option>
        </select>
        <button id="refreshBtn" style="background:#1f2b4e; color:white; border:none; padding:0.5rem 1.5rem; border-radius:40px;">🔄 Оновити</button>
    </div>
    <div style="overflow-x: auto;">
        <table id="ordersTable">
            <thead>
                <tr><th>ID</th><th>Дата</th><th>Сума</th><th>Оплата</th><th>Клієнт</th><th>Статус</th><th>Дії</th></tr>
            </thead>
            <tbody id="ordersList"></tbody>
        </table>
    </div>
</div>

<!-- Модалка деталей замовлення -->
<div id="detailsModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalDetails">&times;</button>
        <h3>Деталі замовлення</h3>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'ua_drop_orders';
    let orders = [];

    function loadOrders() {
        const stored = localStorage.getItem(STORAGE_KEY);
        orders = stored ? JSON.parse(stored) : [];
        renderStats();
        filterAndRender();
    }

    function saveOrders() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
        renderStats();
        filterAndRender();
    }

    function renderStats() {
        const statsDiv = document.getElementById('stats');
        const totalOrders = orders.length;
        const totalSum = orders.reduce((sum, o) => sum + (o.total || 0), 0);
        const newCount = orders.filter(o => o.status === 'Нове').length;
        statsDiv.innerHTML = `
            <div class="stat-card"><h3>Всього замовлень</h3><div class="number">${totalOrders}</div></div>
            <div class="stat-card"><h3>Сума всіх</h3><div class="number">${totalSum.toFixed(2)} ₴</div></div>
            <div class="stat-card"><h3>Нових</h3><div class="number">${newCount}</div></div>
        `;
    }

    function filterAndRender() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const statusFilter = document.getElementById('statusFilter').value;
        const filtered = orders.filter(order => {
            const matchStatus = statusFilter === 'all' || order.status === statusFilter;
            const customerStr = order.customer ? `${order.customer.name} ${order.customer.phone}` : '';
            const itemsStr = order.items ? order.items.map(i => i.name).join(' ') : '';
            const matchSearch = searchTerm === '' || customerStr.toLowerCase().includes(searchTerm) || itemsStr.toLowerCase().includes(searchTerm);
            return matchStatus && matchSearch;
        });
        renderTable(filtered);
    }

    function renderTable(ordersToRender) {
        const tbody = document.getElementById('ordersList');
        tbody.innerHTML = '';
        ordersToRender.forEach(order => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = order.id;
            row.insertCell(1).innerText = order.date || '';
            row.insertCell(2).innerText = `${order.total.toFixed(2)} ₴`;
            row.insertCell(3).innerText = order.paymentMethod || '';
            const customerInfo = order.customer ? `${order.customer.name}<br>${order.customer.phone}` : '—';
            const detailsCell = row.insertCell(4);
            detailsCell.innerHTML = customerInfo;
            detailsCell.classList.add('order-details');
            detailsCell.addEventListener('click', () => showOrderDetails(order));
            // Статус
            const statusCell = row.insertCell(5);
            const select = document.createElement('select');
            select.className = 'status-select';
            ['Нове', 'В обробці', 'Відправлено', 'Виконано', 'Скасовано'].forEach(st => {
                const option = document.createElement('option');
                option.value = st;
                option.textContent = st;
                if (order.status === st) option.selected = true;
                select.appendChild(option);
            });
            select.addEventListener('change', (e) => {
                order.status = e.target.value;
                saveOrders();
            });
            statusCell.appendChild(select);
            // Дії
            const actionCell = row.insertCell(6);
            const delBtn = document.createElement('button');
            delBtn.textContent = '🗑 Видалити';
            delBtn.className = 'btn-delete';
            delBtn.onclick = () => {
                if (confirm(`Видалити замовлення №${order.id}?`)) {
                    orders = orders.filter(o => o.id !== order.id);
                    saveOrders();
                }
            };
            actionCell.appendChild(delBtn);
        });
    }

    function showOrderDetails(order) {
        const modal = document.getElementById('detailsModal');
        const modalBody = document.getElementById('modalBody');
        let itemsHtml = '<ul style="margin-top:0.5rem;">';
        if (order.items && order.items.length) {
            order.items.forEach(item => {
                itemsHtml += `<li>${item.name} — ${item.quantity} шт. x ${item.price} ₴ = ${item.total} ₴</li>`;
            });
        } else {
            itemsHtml += '<li>Немає даних про товари</li>';
        }
        itemsHtml += '</ul>';
        let customerHtml = '';
        if (order.customer) {
            customerHtml = `<p><strong>👤 Ім'я:</strong> ${order.customer.name}<br>
                            <strong>📞 Телефон:</strong> ${order.customer.phone}<br>
                            <strong>🏠 Адреса:</strong> ${order.customer.address}</p>`;
        } else {
            customerHtml = '<p><em>Дані клієнта відсутні (онлайн-оплата)</em></p>';
        }
        modalBody.innerHTML = `
            <p><strong>№ замовлення:</strong> ${order.id}</p>
            <p><strong>Дата:</strong> ${order.date}</p>
            <p><strong>Сума:</strong> ${order.total.toFixed(2)} ₴</p>
            <p><strong>Спосіб оплати:</strong> ${order.paymentMethod || '—'}</p>
            <p><strong>Статус:</strong> ${order.status}</p>
            <hr>
            <h4>Товари:</h4>
            ${itemsHtml}
            <hr>
            <h4>Дані клієнта:</h4>
            ${customerHtml}
        `;
        modal.style.display = 'flex';
    }

    document.getElementById('refreshBtn').addEventListener('click', loadOrders);
    document.getElementById('searchInput').addEventListener('input', filterAndRender);
    document.getElementById('statusFilter').addEventListener('change', filterAndRender);
    document.getElementById('closeModalDetails').addEventListener('click', () => {
        document.getElementById('detailsModal').style.display = 'none';
    });
    window.addEventListener('click', (e) => {
        const modal = document.getElementById('detailsModal');
        if (e.target === modal) modal.style.display = 'none';
    });

    loadOrders();
</script>
</body>
</html>
